<div class="min-h-full">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto max-w-4xl px-6">
      <div class="flex h-16 items-center justify-between">
        <a
          routerLink="/books"
          (click)="closeMenu()"
          class="text-lg font-semibold tracking-tight text-slate-900"
        >
          📚 Book Catalog
        </a>

        <!-- Desktop nav -->
        <nav class="hidden items-center gap-1 text-sm font-medium sm:flex">
          <a
            routerLink="/books"
            routerLinkActive="bg-slate-100 text-slate-900"
            class="rounded-md px-3 py-2 text-slate-500 transition hover:text-slate-900"
          >
            Books
          </a>
          <a
            routerLink="/about"
            routerLinkActive="bg-slate-100 text-slate-900"
            class="rounded-md px-3 py-2 text-slate-500 transition hover:text-slate-900"
          >
            About
          </a>
        </nav>

        <!-- Mobile menu toggle -->
        <button
          type="button"
          (click)="toggleMenu()"
          [attr.aria-expanded]="menuOpen()"
          aria-controls="mobile-menu"
          aria-label="Toggle navigation menu"
          class="inline-flex items-center justify-center rounded-md p-2 text-slate-600 transition hover:bg-slate-100 hover:text-slate-900 sm:hidden"
        >
          @if (menuOpen()) {
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
          } @else {
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5" />
            </svg>
          }
        </button>
      </div>

      <!-- Mobile nav -->
      @if (menuOpen()) {
        <nav id="mobile-menu" class="space-y-1 border-t border-slate-100 py-3 text-sm font-medium sm:hidden">
          <a
            routerLink="/books"
            (click)="closeMenu()"
            routerLinkActive="bg-slate-100 text-slate-900"
            class="block rounded-md px-3 py-2 text-slate-600 transition hover:bg-slate-50 hover:text-slate-900"
          >
            Books
          </a>
          <a
            routerLink="/about"
            (click)="closeMenu()"
            routerLinkActive="bg-slate-100 text-slate-900"
            class="block rounded-md px-3 py-2 text-slate-600 transition hover:bg-slate-50 hover:text-slate-900"
          >
            About
          </a>
        </nav>
      }
    </div>
  </header>

  <main class="mx-auto max-w-4xl px-6 py-8">
    <router-outlet />
  </main>
</div>
